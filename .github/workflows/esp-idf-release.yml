name: ESP-IDF Build and Release

on:
  push:
    branches:
      - main   # or your default branch
    tags:
      - 'v*.*.*'   # Trigger release steps only on tags
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      # 1. Checkout code
      - name: Checkout code
        uses: actions/checkout@v3

      # 2. Install ESP-IDF
      - name: Install ESP-IDF 5.5.2
        uses: espressif/install-esp-idf-action@v1
        with:
          version: 'v5.5.2'

      # 3. Install dependencies
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      # 4. Build project
      - name: Build project
        run: idf.py build

      # 5. List build output
      - name: List build output
        run: ls -lh build

      # 6. Create release only if triggered by a tag
      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        id: create_release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ github.ref_name }}
          name: Release ${{ github.ref_name }}
          body: "Automated ESP‑IDF build from tag ${{ github.ref_name }}"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # 7. Upload build artifacts only if triggered by a tag
      - name: Upload build artifacts
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v1
        with:
          files: |
            build/*.bin
            build/*.elf
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}