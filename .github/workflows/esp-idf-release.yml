name: ESP-IDF Build and Release (Docker + ccache)

on:
  push:
    branches:
      - main
    tags:
      - "v*.*.*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: espressif/idf:release-v5.5

    steps:
      # 1. Checkout
      - name: Checkout code
        uses: actions/checkout@v3

      # 2. Cache ccache
      - name: Cache ccache
        uses: actions/cache@v3
        with:
          path: ~/.ccache
          key: ccache-${{ runner.os }}-${{ github.ref_name }}
          restore-keys: |
            ccache-${{ runner.os }}-

      # 3. Build
      - name: Build project
        shell: bash
        run: |
          source /opt/esp/idf/export.sh
          export IDF_CCACHE_ENABLE=1
          idf.py build

      # 4. Rename firmware files (ONLY for tags)
      - name: Rename firmware files
        if: startsWith(github.ref, 'refs/tags/')
        shell: bash
        run: |
          TAG=${GITHUB_REF_NAME}

          echo "Tag: $TAG"

          # Main firmware (adjust name if needed)
          cp build/*.bin build/firmware-$TAG.bin

          # Optional extras (if exist)
          [ -f build/bootloader/bootloader.bin ] && cp build/bootloader/bootloader.bin build/bootloader-$TAG.bin
          [ -f build/partition_table/partition-table.bin ] && cp build/partition_table/partition-table.bin build/partition-$TAG.bin

          ls -lh build

      # 5. Create release (tags only)
      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v1
        with:
          files: |
            build/firmware-*.bin
            build/bootloader-*.bin
            build/partition-*.bin
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
