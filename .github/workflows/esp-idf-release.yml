name: ESP-IDF Build and Release

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: Set up ESP-IDF 5.5.2
      uses: espressif/esp-idf-action@v2
      with:
        version: 'v5.5.2'

    - name: Export IDF_PATH
      run: echo "IDF_PATH=${HOME}/esp-idf" >> $GITHUB_ENV

    - name: Install project dependencies
      run: |
        python -m pip install --upgrade pip
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

    - name: Build project
      run: idf.py build

    - name: List build output
      run: ls -lh build

    - name: Create or get GitHub Release
      id: create_release
      uses: softprops/action-gh-release@v1
      with:
        tag_name: ${{ github.ref_name }}
        name: Release ${{ github.ref_name }}
        body: "Automated ESP-IDF build from tag ${{ github.ref_name }}"
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: Upload build artifacts
      uses: softprops/action-gh-release@v1
      with:
        files: |
          build/*.bin
          build/*.elf
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}